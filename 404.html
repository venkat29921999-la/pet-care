<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#07152D;
    color:white;
}

.error-container{
    text-align:center;
    padding:20px;
}

.error-container h1{
    font-size:180px;
    color:#FF6B6B;
    line-height:1;
}

.error-container h2{
    font-size:40px;
    margin:20px 0;
}

.error-container p{
    color:#ddd;
    margin-bottom:30px;
    font-size:18px;
}

.home-btn{
    display:inline-block;
    padding:15px 35px;
    background:#FF6B6B;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:600;
    transition:.3s;
}

.home-btn:hover{
    transform:translateY(-5px);
    background:#ff5252;
}

.pet-icon{
    font-size:80px;
    margin-bottom:20px;
}

</style>

</head>
<body>

<div class="error-container">

    <div class="pet-icon">🐶</div>

    <h1>404</h1>

    <h2>Oops! Page Not Found</h2>

    <p>
        The page you are looking for doesn't exist
        or has been moved.
    </p>

    <a href="index.html" class="home-btn">
        Back To Home
    </a>

</div>

</body>
</html>
